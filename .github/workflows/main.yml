name: Build 3DS Homebrew

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/basalt:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install 3DS packages
        run: |
          dgp-install 3ds-libctru 3ds-rules

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_web_hub
          path: build/3ds_web_hub.3dsx
