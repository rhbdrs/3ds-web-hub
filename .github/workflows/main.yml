name: Build 3DS Homebrew

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest # ou devkitpro/devkitarm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install libctru
        run: dkp-pacman -Syy --noconfirm 3ds-libctru 3ds-rules

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_web_hub
          path: build/3ds_web_hub.3dsx
