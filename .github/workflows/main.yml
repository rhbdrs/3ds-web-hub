name: Build 3DS Homebrew

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup devkitPro
        uses: devkitPro/actions/setup@main

      - name: Install 3DS dependencies
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm 3ds-libctru 3ds-rules

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_web_hub
          path: build/3ds_web_hub.3dsx
