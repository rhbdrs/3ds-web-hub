name: Build 3DS Homebrew

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devkitPro pacman & 3DS tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl bzip2 xz-utils libarchive-tools
          
          # Téléchargement et installation du gestionnaire pacman de devkitPro
          sudo dkp-pacman --version || {
            curl -L https://github.com/devkitPro/pacman/releases/download/v1.0.2/devkitpro-pacman.amd64.deb -o dkp.deb
            sudo dpkg -i dkp.deb || sudo apt-get install -f -y
          }

          # Installation des briques 3DS
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-libctru 3ds-rules devkitARM

      - name: Build project
        run: |
          # Ajout du chemin des binaires devkitARM au PATH de l'action
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=${DEVKITPRO}/devkitARM
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3ds_web_hub
          path: build/3ds_web_hub.3dsx
